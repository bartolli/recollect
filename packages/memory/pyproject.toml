[project]
name = "recollect"
version = "0.6.1"
description = "Human-like memory for AI applications"
readme = "README.md"
license = "MIT"
requires-python = ">=3.12.4"
dependencies = [
    "asyncpg>=0.31.0",
    "fastembed>=0.7.4",
    "orjson>=3.11.7",
    "pgvector>=0.4.2",
    "pydantic>=2.12.5",
    "pydantic-ai>=1.0",
]

[project.urls]
Homepage = "https://github.com/bartolli/recollect"
Repository = "https://github.com/bartolli/recollect"
Documentation = "https://github.com/bartolli/recollect#readme"
Issues = "https://github.com/bartolli/recollect/issues"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/recollect"]
