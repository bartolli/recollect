[project]
name = "recollect-mcp"
version = "0.6.1"
description = "MCP server for Recollect"
readme = "README.md"
license = "MIT"
requires-python = ">=3.12.4"
dependencies = [
    "recollect",
    "mcp>=1.26.0",
    "humanize>=4.15.0",
]

[project.scripts]
recollect-mcp = "recollect_mcp.server:main"

[project.urls]
Homepage = "https://github.com/bartolli/recollect"
Repository = "https://github.com/bartolli/recollect"
Documentation = "https://github.com/bartolli/recollect/tree/main/packages/memory-mcp#readme"
Issues = "https://github.com/bartolli/recollect/issues"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/recollect_mcp"]

[tool.uv.sources]
recollect = { workspace = true }
